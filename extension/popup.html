<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 220px;
        font-family: -apple-system, "Segoe UI", Malgun Gothic, sans-serif;
        font-size: 13px;
        margin: 0;
        padding: 12px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      h1 #ver {
        font-size: 10px;
        font-weight: 400;
        color: #aaa;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      button {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-size: 13px;
      }
      button:disabled {
        background: #9ca3af;
        cursor: default;
      }
      a {
        display: block;
        text-align: center;
        margin-top: 8px;
        font-size: 12px;
        color: #2563eb;
      }
      .hint {
        color: #888;
        font-size: 11px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h1>한국어 맞춤법 검사기 <span id="ver"></span></h1>
    <div class="row">
      <span>사용</span>
      <input type="checkbox" id="enabled" />
    </div>
    <div class="row">
      <span>타이핑 시 자동 검사</span>
      <input type="checkbox" id="autoCheck" />
    </div>
    <button id="run">현재 입력창 검사 (Ctrl+Shift+K)</button>
    <div class="hint">웹페이지의 입력창이나 편집 영역을 먼저 클릭한 뒤 실행하세요.</div>
    <div class="hint">자동 검사를 켜면 타이핑을 멈춘 뒤 잠시 후 자동으로 검사합니다. 끄면 단축키·버튼으로만 검사합니다.</div>
    <a href="options.html" target="_blank">설정 열기</a>
    <script src="popup.js"></script>
  </body>
</html>
